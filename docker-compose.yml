version: '3.8'

services:
  backend:
    build:
      context: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    # environment:
    #   - MONGO_URI=your_mongo_uri_here
    #   - JWT_SECRET=your_secret_here
    #   - PORT=5000

  frontend:
    build:
      context: ./pulseboard-frontend
      args:
        - REACT_APP_API_URL=http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend
