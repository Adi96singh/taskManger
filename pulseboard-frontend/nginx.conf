server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy /api requests to backend if needed, but since we separate them
    # we usually just point REACT_APP_API_URL to the absolute URL of the backend.
}
